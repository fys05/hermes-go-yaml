apiVersion: apps/v1
kind: Deployment
metadata:
  name: yaml-validator
  namespace: ${K8S_NAMESPACE}
  labels:
    app: yaml-validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yaml-validator
  template:
    metadata:
      labels:
        app: yaml-validator
    spec:
      containers:
        - name: yaml-validator
          image: ${DOCKER_IMAGE}:${DOCKER_TAG}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/yaml-validator"]
          args: ["--serve", ":8080"]
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
